<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Dojo Code Chamber Test (Extension Equivalent)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Speech Bubble elements */
    .bubble-tail {
      content: '';
      position: absolute;
      left: -20px;
      top: 40px;
      border-width: 15px 20px 15px 0;
      border-style: solid;
      border-color: transparent #1b1b1d transparent transparent;
    }

    .bubble-tail::before {
      content: '';
      position: absolute;
      top: -18px;
      left: -3px;
      border-width: 18px 23px 18px 0;
      border-style: solid;
      border-color: transparent #5b403f transparent transparent;
      z-index: -1;
    }

    @media (max-width: 768px) {
      .bubble-tail {
        left: 20%;
        top: -20px;
        border-width: 0 15px 20px 15px;
        border-color: transparent transparent #1b1b1d transparent;
      }
      .bubble-tail::before {
        top: -23px;
        left: -18px;
        border-width: 0 18px 23px 18px;
        border-color: transparent transparent #5b403f transparent;
      }
    }

    /* Pixelated rendering for retro sprite */
    .pixelated {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Cyberpunk utilities */
    .glow-crimson { box-shadow: 0 0 40px rgba(187, 21, 44, 0.6), inset 0 0 20px rgba(187, 21, 44, 0.3); border: 2px solid #bb152c; }

    /* Scanline effect */
    .scanlines {
        position: relative;
        background-image: linear-gradient(
            to bottom,
            rgba(255,255,255,0),
            rgba(255,255,255,0) 50%,
            rgba(0,0,0,0.2) 50%,
            rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
    }

    .hologram-frame {
        box-shadow: 0 0 15px rgba(111, 216, 200, 0.6), inset 0 0 10px rgba(111, 216, 200, 0.3);
        border: 2px solid #6fd8c8;
        background-color: rgba(14, 14, 16, 0.8);
        position: relative;
    }

    .hologram-frame::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(111, 216, 200, 0.1) 2px,
            rgba(111, 216, 200, 0.1) 4px
        );
        pointer-events: none;
        z-index: 10;
    }
  </style>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-hidden">
  
  <!-- The overlay from InterventionOverlay.tsx -->
  <div class="fixed inset-0 w-full h-full bg-[#131315]/80 backdrop-blur-md z-[9999] flex items-center justify-center p-4 md:p-8 select-none overflow-hidden text-[#e5e1e4] scanlines">
    <!-- Center Intervention Card -->
    <div class="bg-[#1E1E24] w-full max-w-4xl rounded-sm glow-crimson flex flex-col relative overflow-hidden animate-[pulse_3s_ease-in-out_infinite] z-50">
      
      <!-- Wood Texture / Scroll Banner Header -->
      <div class="bg-[#0e0e10] border-b-[3px] border-[#bb152c] p-6 flex justify-between items-center px-8 relative">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiMzOTM5M2IiIGZpbGwtb3BhY2l0eT0iMC41Ii8+PC9zdmc+')] opacity-10"></div>
        <div class="flex items-center gap-4 relative z-10">
          <i data-lucide="triangle-alert" class="text-[#fbb400] w-10 h-10 shrink-0"></i>
          <h1 class="text-4xl md:text-5xl text-[#fbb400] tracking-tighter uppercase drop-shadow-[0_0_8px_rgba(251,180,0,0.8)] m-0" style='font-family: Impact, "Arial Black", sans-serif'>
            Dojo Code Chamber
          </h1>
        </div>
        <i data-lucide="cpu" class="text-[#fbb400] w-10 h-10 shrink-0 relative z-10"></i>
      </div>

      <!-- Content Area -->
      <div class="p-6 md:p-8 flex flex-col md:flex-row gap-8 items-center md:items-start relative bg-[#131315]">
        <!-- Oji-San Sprite Frame -->
        <div class="shrink-0 w-64 h-64 hologram-frame p-2 flex items-center justify-center relative overflow-hidden">
          <img 
            id="oji-san-sprite"
            alt="Master Oji-San" 
            class="w-full h-full object-cover pixelated relative z-20" 
            src="" 
          />
        </div>

        <!-- Speech Bubble Area -->
        <div class="flex-1 w-full pt-4 md:pt-0 h-full flex">
          <div class="bg-[#1b1b1d] border-2 border-[#5b403f] p-6 relative rounded-sm shadow-[0_0_15px_rgba(0,0,0,0.5)] text-[#e5e1e4] flex-1">
            <div class="bubble-tail"></div>
            <h2 class="text-2xl font-black text-[#bb152c] uppercase mb-4 tracking-widest drop-shadow-[0_0_5px_rgba(187,21,44,0.8)] leading-none mt-0" style='font-family: Impact, "Arial Black", sans-serif'>
              "FOOLISH DISCIPLE!"
            </h2>
            <p class="text-lg text-[#e5e1e4] font-medium leading-relaxed m-0" style='font-family: system-ui, -apple-system, sans-serif'>
              Dishonor! You claim to learn React yet you wander into a hackathon page, as if you were a novice seeking a sword in a marketplace. Return to your code before I make you practice the kata of the empty scroll!
            </p>
          </div>
        </div>
      </div>

      <!-- Action Buttons Footer -->
      <div class="bg-[#201f21] border-t-2 border-[#bb152c] p-6 flex flex-col md:flex-row justify-end gap-4">
        <button 
          id="btn-bypass"
          class="px-6 py-4 bg-[#353437] text-[#e5e1e4] text-sm uppercase border-2 border-[#5b403f] hover:border-[#fbb400] hover:text-[#fbb400] transition-all duration-150 flex items-center justify-center gap-2 w-full md:w-auto tracking-widest hover:shadow-[0_0_10px_rgba(251,180,0,0.3)] cursor-pointer"
          style='font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace'
        >
          <i data-lucide="history" class="w-5 h-5 shrink-0"></i>
          I am actually working (Request Bypass)
        </button>
        
        <button 
          id="btn-close"
          class="px-6 py-4 bg-[#bb152c] text-[#F1FAEE] text-sm uppercase font-bold border-2 border-[#bb152c] hover:bg-[#410007] hover:border-[#bb152c] transition-all duration-150 flex items-center justify-center gap-2 w-full md:w-auto tracking-widest shadow-[0_0_15px_rgba(187,21,44,0.6)] hover:shadow-[0_0_25px_rgba(187,21,44,0.8)] cursor-pointer"
          style='font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace'
        >
          <i data-lucide="hand" class="w-5 h-5 shrink-0"></i>
          Forgive me, Oji-San (Close Tab)
        </button>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
    
    // Wire up image hovers directly pulling from assets
    const sprite = document.getElementById('oji-san-sprite');
    const angrySrc = './src/assets/oji-san-states/angry.png';
    const thinkingSrc = './src/assets/oji-san-states/thinking.png';
    const proudSrc = './src/assets/oji-san-states/proud.png';

    sprite.src = angrySrc;

    const btnBypass = document.getElementById('btn-bypass');
    btnBypass.addEventListener('mouseenter', () => sprite.src = thinkingSrc);
    btnBypass.addEventListener('mouseleave', () => sprite.src = angrySrc);

    const btnClose = document.getElementById('btn-close');
    btnClose.addEventListener('mouseenter', () => sprite.src = proudSrc);
    btnClose.addEventListener('mouseleave', () => sprite.src = angrySrc);
  </script>
</body>
</html>
